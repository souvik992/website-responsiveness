name: Mobile Devices Matrix

# Manual trigger only — even a filtered run places at least one real order
# through the Razorpay sandbox per device, so it should never run on every
# push/PR. By default (both inputs blank) this places all 200.
on:
  workflow_dispatch:
    inputs:
      base_url:
        description: 'Target site URL'
        required: false
        default: 'https://restaurant-website-delivery-takeaway-default-template.replit.app'
      devices:
        description: 'Comma-separated exact device names to run (blank = all ~200). Run `npx tsx scripts/select-device-matrix.ts --list` locally to see valid names.'
        required: false
        default: ''
      order_count:
        description: 'Max number of devices/orders to run (blank = no limit). Applied after the devices filter, if any — e.g. devices blank + order_count=10 runs the first 10 of the full matrix.'
        required: false
        default: ''

jobs:
  select-devices:
    runs-on: ubuntu-latest
    outputs:
      total: ${{ steps.select.outputs.total }}
      grep: ${{ steps.select.outputs.grep }}
      shard_count: ${{ steps.select.outputs.shard_count }}
      shards_json: ${{ steps.select.outputs.shards_json }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # Builds the exact same ordered device list place-order-device-matrix.spec.ts
      # does internally (see scripts/select-device-matrix.ts) without touching
      # that file, and emits a --grep pattern + a right-sized shard count for
      # whatever subset was requested.
      - name: Resolve requested devices
        id: select
        env:
          DEVICES: ${{ github.event.inputs.devices }}
          COUNT: ${{ github.event.inputs.order_count }}
        run: npx tsx scripts/select-device-matrix.ts

  place-orders:
    needs: select-devices
    runs-on: ubuntu-latest
    # GitHub-hosted runners hard-cap a job at 360 minutes. The full 200-device
    # matrix split across 8 shards (~25 devices each) needs well under that
    # even at the suite's own worst-case ~8 min/device budget (25 × 8 = 200
    # min); 350 leaves headroom without masking a genuinely stuck job. Safe
    # as an upper bound for smaller filtered runs too — they finish faster.
    timeout-minutes: 350
    strategy:
      # One shard failing (e.g. a real device-specific bug) shouldn't cancel
      # the others — each shard's result is independent data for the report.
      fail-fast: false
      matrix:
        shard: ${{ fromJson(needs.select-devices.outputs.shards_json) }}
    env:
      BASE_URL: ${{ github.event.inputs.base_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npx playwright install --with-deps chromium webkit firefox

      # Confirmed live (not a Playwright default): `--shard` cannot split a
      # `test.describe.configure({ mode: 'serial' })` block spanning a whole
      # file — every test lands in shard 1 and every other shard runs 0
      # tests. This suite deliberately does NOT use serial mode for that
      # reason; sequential execution *within* this shard's own job instead
      # comes from `--workers=1`, so real OTP/order/payment calls never race
      # each other inside a single job (they still run concurrently *across*
      # the parallel shard jobs — an accepted tradeoff to fit GitHub's
      # 360-minute job cap; the local, fully-sequential 200-device run
      # remains the safer option when that race risk isn't acceptable).
      #
      # --grep is only non-empty when devices/order_count actually narrowed
      # the matrix below all 200 (see select-device-matrix.ts) — an unfiltered
      # run passes no --grep at all, identical to this workflow's prior behavior.
      - name: Run shard ${{ matrix.shard }}/${{ needs.select-devices.outputs.shard_count }}
        run: |
          GREP="${{ needs.select-devices.outputs.grep }}"
          if [ -n "$GREP" ]; then
            npx playwright test tests/place-order-device-matrix.spec.ts --project=device-orders --workers=1 --shard=${{ matrix.shard }}/${{ needs.select-devices.outputs.shard_count }} --reporter=list --grep "$GREP"
          else
            npx playwright test tests/place-order-device-matrix.spec.ts --project=device-orders --workers=1 --shard=${{ matrix.shard }}/${{ needs.select-devices.outputs.shard_count }} --reporter=list
          fi

      - name: Upload shard results (screenshots + per-device JSON)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: device-order-results-shard-${{ matrix.shard }}
          path: test-results/device-orders/
          retention-days: 14
          if-no-files-found: warn

  merge-report:
    needs: place-orders
    if: always()
    runs-on: ubuntu-latest
    # Needed to delete the intermediate per-shard artifacts below, so only
    # the one merged artifact this job produces is left once the workflow
    # finishes.
    permissions:
      actions: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Download every shard's results
        uses: actions/download-artifact@v4
        with:
          pattern: device-order-results-shard-*
          path: merged-results

      # Combines every shard's per-device JSON into one Excel workbook
      # (Summary / Order Placement Failures / Compatibility Issues sheets) —
      # see scripts/merge-device-order-results.ts. Reuses the exact same
      # report generator the local overnight run uses, so the CI report and
      # the local report are identical in structure.
      - name: Merge shard results into one Excel report
        run: npx tsx scripts/merge-device-order-results.ts merged-results test-results/device-order-report.xlsx

      # Shard directories only exist to hand results off between jobs — the
      # final artifact should read as one flat report plus one folder per
      # device, not nested under each shard's own artifact name. Device ids
      # are unique across every shard, so this can never collide.
      - name: Flatten every shard's screenshots into one folder per device
        run: |
          mkdir -p final-report/screenshots
          cp test-results/device-order-report.xlsx final-report/
          shopt -s nullglob
          for device_dir in merged-results/*/screenshots/*/; do
            cp -r "$device_dir" "final-report/screenshots/$(basename "$device_dir")"
          done

      - name: Upload merged report + all screenshots
        uses: actions/upload-artifact@v4
        with:
          name: device-order-report
          path: final-report/
          retention-days: 30

      # Only the merged artifact above should remain once this workflow
      # finishes — the per-shard artifacts were only ever an intermediate
      # hand-off into this job.
      - name: Delete intermediate per-shard artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api "repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts" --paginate \
            -q '.artifacts[] | select(.name | startswith("device-order-results-shard-")) | .id' \
            | while read -r artifact_id; do
                gh api -X DELETE "repos/${{ github.repository }}/actions/artifacts/$artifact_id"
              done
