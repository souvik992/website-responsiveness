name: Desktop and Browser Matrix

# Manual trigger only — like the device matrix workflow, this places a real
# order through the Razorpay sandbox for every desktop project that runs, so
# it shouldn't fire on every push/PR. Trigger it from the Actions tab, and
# re-run a single failed browser from there too (Actions → this run →
# "Re-run jobs" → pick the one job you want, e.g. just desktop-firefox).
on:
  workflow_dispatch:
    inputs:
      base_url:
        description: 'Target site URL'
        required: false
        default: 'https://restaurant-website-delivery-takeaway-default-template.replit.app'

jobs:
  desktop:
    runs-on: ubuntu-latest
    strategy:
      # One browser failing (e.g. a real WebKit-specific bug) shouldn't cancel
      # the others — each is independent, and failures are per-browser signal.
      fail-fast: false
      matrix:
        project:
          - desktop-chrome
          - desktop-firefox
          - desktop-webkit
          - desktop-edge
          - desktop-chrome-1920x1080
          - desktop-chrome-1366x768
          - desktop-chrome-1440x900
          - desktop-firefox-1920x1080
          - desktop-firefox-1366x768
          - desktop-firefox-1440x900
          - desktop-webkit-1920x1080
          - desktop-webkit-1366x768
          - desktop-webkit-1440x900
          - desktop-edge-1920x1080
          - desktop-edge-1366x768
          - desktop-edge-1440x900
    env:
      BASE_URL: ${{ github.event.inputs.base_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # Only install the browser binary this matrix leg actually needs.
      # Matched by prefix (not exact name) since a resolution leg's project
      # name is desktop-<engine>-<resolution>, e.g. desktop-firefox-1920x1080.
      - name: Install browser for ${{ matrix.project }}
        run: |
          case "${{ matrix.project }}" in
            desktop-firefox*) npx playwright install --with-deps firefox ;;
            desktop-webkit*)  npx playwright install --with-deps webkit ;;
            desktop-edge*)    npx playwright install --with-deps msedge ;;
            *)                npx playwright install --with-deps chromium ;;
          esac

      - name: Run tests/e2e on ${{ matrix.project }}
        run: npx playwright test tests/e2e --project=${{ matrix.project }} --reporter=list

      - name: Upload report for ${{ matrix.project }}
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: desktop-e2e-report-${{ matrix.project }}
          path: playwright-report/
          retention-days: 14
          if-no-files-found: warn

      # place-order.spec.ts writes the same per-run JSON result + step
      # screenshots the device-matrix suite does (see utils/deviceOrders/*),
      # so this leg's own result needs uploading here the same way that
      # suite's shards do — otherwise only the device-matrix's mobile runs
      # end up with a downloadable report/screenshots artifact and this
      # desktop leg doesn't.
      - name: Upload order result (screenshots + JSON) for ${{ matrix.project }}
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: desktop-order-results-${{ matrix.project }}
          path: test-results/device-orders/
          retention-days: 14
          if-no-files-found: warn

  merge-report:
    needs: desktop
    if: always()
    runs-on: ubuntu-latest
    # Needed to delete the intermediate per-project artifacts below, so only
    # the one merged artifact this job produces is left once the workflow
    # finishes.
    permissions:
      actions: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Download every project's order result
        uses: actions/download-artifact@v4
        with:
          pattern: desktop-order-results-*
          path: merged-results

      # Reuses the exact same merge script the device-matrix workflow uses
      # (see .github/workflows/device-order-matrix.yml) — it already walks
      # every subdirectory it's given rather than hardcoding shard names, so
      # this desktop-project matrix works with it unchanged.
      - name: Merge every project's result into one Excel report
        run: npx tsx scripts/merge-device-order-results.ts merged-results test-results/desktop-order-report.xlsx

      # Per-project directories only exist to hand results off between jobs —
      # the final artifact should read as one flat report plus one folder per
      # browser/resolution, not nested under each leg's own artifact name.
      - name: Flatten every project's screenshots into one folder per project
        run: |
          mkdir -p final-report/screenshots
          cp test-results/desktop-order-report.xlsx final-report/
          shopt -s nullglob
          for device_dir in merged-results/*/screenshots/*/; do
            cp -r "$device_dir" "final-report/screenshots/$(basename "$device_dir")"
          done

      - name: Upload merged report + all screenshots
        uses: actions/upload-artifact@v4
        with:
          name: desktop-order-report
          path: final-report/
          retention-days: 30

      # Only the merged artifact above should remain once this workflow
      # finishes — the per-project artifacts (both the Playwright HTML report
      # and the order-result JSON/screenshots) were only ever an intermediate
      # hand-off into this job.
      - name: Delete intermediate per-project artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api "repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts" --paginate \
            -q '.artifacts[] | select(.name | startswith("desktop-order-results-") or startswith("desktop-e2e-report-")) | .id' \
            | while read -r artifact_id; do
                gh api -X DELETE "repos/${{ github.repository }}/actions/artifacts/$artifact_id"
              done
